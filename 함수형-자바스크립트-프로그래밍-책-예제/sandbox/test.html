<html>
<script src="underscore.1.13.7-min.js"></script>
<script>
    let greet = name => "Hello, " + name;
    let exclaim = greet => greet.toUpperCase() + "!!!";
    let welcome = _.compose(greet, exclaim);
    console.log(welcome("JavaScript")); // Hello, JAVASCRIPT!!!

    (function () {
        console.log(this);
        console.log('즉시 실행 함수');
    }.call(this));

    let users = [
        { id: 1, name: "ID", age: 32 },
        { id: 2, name: "HA", age: 25 },
        { id: 3, name: "BJ", age: 32 },
        { id: 4, name: "PJ", age: 28 },
        { id: 5, name: "JE", age: 27 },
        { id: 6, name: "JM", age: 32 },
        { id: 7, name: "HI", age: 24 }
    ];

    // filter 예제
    const filter = (list, predicate) => {
        const newList = [];
        for (let i = 0; i < list.length; i++) {
            if (predicate(list[i])) {
                newList.push(list[i]);
            }
        }
        return newList;
    }
    let u30 = filter(users, user => user.age < 30);
    console.table('30세 미만: ', u30);

    // clousure 예제
    function addMaker(a) {
        return function (b) {
            return a - b;
        }
    }
    console.log('addMaker(10)(4): ' + addMaker(10)(4)); // 6
</script>
